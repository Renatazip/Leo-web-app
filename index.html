<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Дневник питания</title>
</head>
<body>
    <form>
        <label for="eat">Что ты ела?</label>
        <input type="text" id="eat" name="eat"><br><br>

        <label for="time">Во сколько:</label>
        <input type="time" id="time" name="time" value="now"><br><br>
        
        <label for="hunger-level">Уровень голода до еды:</label>
        <input type="range" id="hunger-level" name="hungerlevel" min="1" max="10"><br><br>
        
        <label for="reasons">Причины поесть:</label>
        <input type="text" id="reasons" name="reasons"><br><br>
        
        <label for="satisfaction-level">Уровень насыщения после еды:</label>
        <input type="range" id="satisfaction-level" name="satisfactionlevel" min="1" max="10"><br><br>
        
        <label for="feelings">Ощущения после:</label>
        <input type="text" id="feelings" name="feelings"><br><br>
        
        <label for="comments">Комментарий:</label>
        <input type="text" id="comments" name="comments" ><br><br>
        
        <button id="send">Сохранить прием пищи</button>
    </form>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.Webapp;
        let send = document.getElementById("send");
        
        send.addEventListener("click", () => {
            var eat = document.getElementById('eat').value;
            var time = document.getElementById('time').value;
            var hungerLevel = document.getElementById('hunger-level').value;
            var reasons = document.getElementById('reasons').value;
            var satisfactionLevel = document.getElementById('satisfaction-level').value;
            var feelings = document.getElementById('feelings').value;
            var comments = document.getElementById('comments').value;

            let data = {
                eat: eat,
                time: time,
                hungerLevel: hungerLevel,
                reasons: reasons,
                satisfactionLevel: satisfactionLevel,
                feelings: feelings,
                comments: comments
            }

            tg.sendData(JSON.stringify(data));

            tg.close();
        });


    
    </script>
</body>
</html>
