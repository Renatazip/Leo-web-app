<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>Дневник питания</title>
</head>
<style>
    body {
        background: var(--tg-theme-bg-color);
    }
</style>
<body>
    <form>
        <label for="eat">Что ты ела?</label>
        <input type="text" id="eat" name="eat"><br><br>
        
        <button id="send">Сохранить прием пищи</button>
    </form>
    
    <script>
        let tg = window.Telegram.Webapp;
        let send = document.getElementById("send");
        
        send.addEventListener("click", () => {
            var eat = document.getElementById('eat').value;

            tg.sendData(eat);

            tg.close();
        });


    
    </script>
</body>
</html>
